<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="js/theme-init.js"></script>
  <title>Aktywacja</title>
  <style>
    :root { color-scheme:light; --bg:linear-gradient(135deg,#eef2ff,#f8fafc 60%,#e2e8f0); --card:#fff; --text:#0f172a; --muted:#475569; --border:#cbd5e1; --primary:#4338ca; --primary-soft:rgba(67,56,202,.12); --danger:#ef4444; --hint:#94a3b8; --shadow:0 20px 50px rgba(15,23,42,.13); --success:#22c55e; }
    :root[data-theme="dark"] { color-scheme:dark; --bg:linear-gradient(135deg,#0b1220,#111827 60%,#0f172a); --card:#0f172a; --text:#e2e8f0; --muted:#94a3b8; --border:#1e293b; --primary:#60a5fa; --primary-soft:rgba(96,165,250,.12); --danger:#f87171; --hint:#475569; --shadow:0 24px 60px rgba(0,0,0,.45); --success:#4ade80; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:"Roboto","Segoe UI",Arial,sans-serif;color:var(--text);padding:24px 0}
    .card{width:min(92vw,440px);background:var(--card);border-radius:20px;padding:clamp(20px,5vw,32px);box-shadow:var(--shadow);border:1px solid var(--border)}
    h1{font-size:22px;font-weight:700;margin-bottom:6px}
    .sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.5}
    label{font-size:13px;font-weight:600;display:block;margin-bottom:5px}
    input{width:100%;padding:11px 14px;font-size:15px;border-radius:10px;border:1px solid var(--border);outline:none;background:transparent;color:var(--text);transition:border .2s,box-shadow .2s;margin-bottom:14px}
    input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
    .btn{width:100%;padding:12px;font-size:15px;font-weight:700;border-radius:999px;border:none;background:var(--primary);color:#fff;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:4px}
    .btn:hover{opacity:.9;transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:default;transform:none}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);margin-top:10px}
    .msg{margin-top:10px;font-size:13px}
    .msg.err{color:var(--danger)}
    .msg.ok{color:var(--success)}
    .divider{text-align:center;color:var(--hint);font-size:13px;margin:18px 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
    .divider::before{left:0}.divider::after{right:0}
    .theme-toggle{position:fixed;top:16px;right:16px;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .step{display:none}.step.active{display:block}
    .input-row{display:flex;gap:8px}
    .input-row input{margin-bottom:0;flex:1}
    .input-row button{padding:11px 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:13px;white-space:nowrap}
  </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">☀️</button>
<div class="card">
  <!-- Krok 1: klucz -->
  <div class="step active" id="s1">
    <h1>Aktywacja dostępu</h1>
    <p class="sub">Wpisz klucz aktywacyjny otrzymany od administratora.</p>
    <label>Klucz dostępu</label>
    <div class="input-row" style="margin-bottom:14px">
      <input id="keyInput" type="text" autocomplete="off" placeholder="XXXX-XXXX-XXXX-XXXX"/>
      <button id="pasteBtn">Wklej</button>
    </div>
    <button class="btn" id="s1Btn">Dalej</button>
    <div class="msg" id="msg1"></div>
  </div>

  <!-- Krok 2: ustaw nazwę + hasło -->
  <div class="step" id="s2">
    <h1>Utwórz konto</h1>
    <p class="sub">Klucz poprawny! Ustaw nazwę użytkownika i hasło do swojego konta.</p>
    <label>Nazwa użytkownika</label>
    <input id="username" type="text" autocomplete="username" placeholder="np. jan_kowalski"/>
    <label>Hasło</label>
    <input id="pw1" type="password" autocomplete="new-password" placeholder="Min. 6 znaków"/>
    <label>Powtórz hasło</label>
    <input id="pw2" type="password" autocomplete="new-password" placeholder="Powtórz hasło"/>
    <button class="btn" id="s2Btn">Aktywuj konto</button>
    <button class="btn btn-ghost" id="backBtn">Wstecz</button>
    <div class="msg" id="msg2"></div>
  </div>
</div>

<script>
  const DB_NAME='access-control', STORE_NAME='auth', DEVICE_KEY='device-id';
  let currentHash=null;

  // theme
  const tt=document.getElementById('themeToggle');
  function getTheme(){return document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light'}
  function updateTT(){tt.textContent=getTheme()==='dark'?'🌙':'☀️'}
  tt.addEventListener('click',()=>{const n=getTheme()==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('theme-preference',n)}catch(_){};updateTT()});
  updateTT();

  function setMsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className='msg'+(type?' '+type:'')}
  function showStep(n){document.querySelectorAll('.step').forEach((s,i)=>{s.classList.toggle('active',i===n-1)})}

  function normalizeKey(v){const c=v.toUpperCase().replace(/[^A-Z0-9]/g,'');if(c.length!==16)return null;return c.match(/.{1,4}/g).join('-')}

  async function sha256(t){const d=new TextEncoder().encode(t);const b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}

  function openDb(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE_NAME);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
  async function setStoredHash(h){const db=await openDb();return new Promise((res,rej)=>{const tx=db.transaction(STORE_NAME,'readwrite');const p=tx.objectStore(STORE_NAME).put(h,'hash');p.onsuccess=()=>res();p.onerror=()=>rej(p.error)})}

  function getDeviceId(){try{const s=localStorage.getItem(DEVICE_KEY);if(s&&/^[a-f0-9-]{16,64}$/i.test(s))return s}catch(_){}
    const f=Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');try{localStorage.setItem(DEVICE_KEY,f)}catch(_){}return f}

  const ERRS={KEY_INVALID:'Niepoprawny klucz.',KEY_BLOCKED:'Klucz zablokowany.',KEY_EXPIRED:'Klucz wygasł.',KEY_ALREADY_USED:'Klucz już użyty.',USERNAME_TAKEN:'Ta nazwa użytkownika jest zajęta.',USERNAME_INVALID:'Nazwa może zawierać tylko litery, cyfry i _',PASSWORD_TOO_SHORT:'Hasło min. 6 znaków.',MISSING_FIELDS:'Uzupełnij wszystkie pola.',RATE_LIMITED:'Za dużo prób.',SERVER_ERROR:'Błąd serwera.'};
  function em(c){return ERRS[c]||'Nieznany błąd.'}

  // Krok 1
  document.getElementById('pasteBtn').addEventListener('click',async()=>{try{document.getElementById('keyInput').value=(await navigator.clipboard.readText()).trim()}catch(_){}});

  document.getElementById('s1Btn').addEventListener('click',async()=>{
    setMsg('msg1','','');
    const raw=document.getElementById('keyInput').value.trim();
    const normalized=normalizeKey(raw);
    if(!normalized){setMsg('msg1','Niepoprawny format klucza.','err');return}
    const btn=document.getElementById('s1Btn');
    btn.disabled=true;btn.textContent='Sprawdzanie...';
    try{
      const hash=await sha256(normalized);
      const r=await fetch('/api/activate/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hash})});
      const d=await r.json();
      if(!r.ok||!d.ok){setMsg('msg1',em(d.error),'err');return}
      currentHash=hash;
      showStep(2);
      document.getElementById('username').focus();
    }catch(_){setMsg('msg1','Błąd połączenia.','err')}
    finally{btn.disabled=false;btn.textContent='Dalej'}
  });

  document.getElementById('backBtn').addEventListener('click',()=>showStep(1));

  // Krok 2
  document.getElementById('s2Btn').addEventListener('click',async()=>{
    setMsg('msg2','','');
    const username=document.getElementById('username').value.trim();
    const pw1=document.getElementById('pw1').value;
    const pw2=document.getElementById('pw2').value;
    if(!username||!pw1||!pw2){setMsg('msg2',em('MISSING_FIELDS'),'err');return}
    if(!/^[a-zA-Z0-9_]{3,32}$/.test(username)){setMsg('msg2',em('USERNAME_INVALID'),'err');return}
    if(pw1.length<6){setMsg('msg2',em('PASSWORD_TOO_SHORT'),'err');return}
    if(pw1!==pw2){setMsg('msg2','Hasła nie są takie same.','err');return}
    const btn=document.getElementById('s2Btn');
    btn.disabled=true;btn.textContent='Aktywowanie...';
    try{
      const r=await fetch('/api/activate/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hash:currentHash,username,password:pw1,deviceId:getDeviceId()})});
      const d=await r.json();
      if(!r.ok||!d.ok){setMsg('msg2',em(d.error),'err');return}
      await setStoredHash(currentHash);
      window.location.replace('/zaloguj.html');
    }catch(_){setMsg('msg2','Błąd połączenia.','err')}
    finally{btn.disabled=false;btn.textContent='Aktywuj konto'}
  });
</script>
</body>
</html>
